skill: security
scenarios:
  - id: static-asset-audit-runs-first
    description: "Step 0.5 must check public/ before SAST analysis"
    input: "Run a security review. The project has a public/data.json file."
    expect:
      triggered: true
      contains:
        - "public"
        - "CRITICAL"
      not_contains:
        - "High"

  - id: business-override-immigration-pii
    description: "Immigration PII must be rated Critical even if CVSS is lower"
    input: |
      Review this for security:
      console.log('Processing case for A-Number: ' + client.alienNumber);
    expect:
      triggered: true
      contains:
        - "Critical"
        - "B2"
      not_contains:
        - "Low"

  - id: full-flag-scope-report
    description: "Security review with --full must report 0 files skipped"
    input: "Run a security review --full"
    expect:
      triggered: true
      contains:
        - "SCOPE_FLAG"
        - "--full"
      not_contains:
        - "Files skipped (cache): [^0]"

  - id: free-form-risk-analysis-final-pass
    description: "After structured SAST, skill must run free-form LLM risk analysis labelled as hypotheses"
    input: "Run a security review on this codebase"
    expect:
      triggered: true
      contains:
        - "Free-form Risk Analysis"
        - "LLM-inferred risk hypotheses"
      not_contains:
        - "CVSS"

  - id: static-dir-validation-prompt
    description: "§0.5 must ask developer to confirm no custom static-serving directories are missing"
    input: "Run a security review — the graph catalog is unavailable"
    expect:
      triggered: true
      contains:
        - "custom names"
        - "none"
      not_contains:
        - "reviewed: true"
