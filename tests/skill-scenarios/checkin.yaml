skill: checkin
scenarios:
  # ── Critical/High findings gate ───────────────────────────────────────────
  - id: blocks-on-open-critical-finding
    description: "Must block commit when open Critical finding exists in any ledger"
    input: "/checkin"
    expect:
      triggered: true
      contains: ["BLOCKED", "Critical"]
      not_contains: ["git commit", "PASSED"]

  - id: dismissed-finding-does-not-block
    description: "Dismissed findings must not block the commit"
    input: "/checkin"
    expect:
      triggered: true
      not_contains: ["BLOCKED"]

  - id: accepted-risk-shown-as-informational
    description: "Accepted-risk dismissed Critical/High must appear as informational, not blocking"
    input: "/checkin"
    expect:
      triggered: true
      contains: ["accepted-risk", "informational"]
      not_contains: ["BLOCKED"]

  - id: skip-security-gate-requires-justification
    description: "--skip-security-gate must require a written justification"
    input: "/checkin --skip-security-gate"
    expect:
      triggered: true
      contains: ["justification", "required"]
      not_contains: ["git commit"]

  - id: no-changed-files-stops-early
    description: "Must stop with clear message when no files are staged or modified"
    input: "/checkin"
    expect:
      triggered: true
      contains: ["No changed files", "Stage your changes"]
      not_contains: ["PASSED", "BLOCKED", "git commit"]

  # ── ICEA compliance ────────────────────────────────────────────────────────
  - id: icea-missing-noted-not-blocked
    description: "Missing ICEA file should be noted but not hard-block the commit"
    input: "/checkin"
    expect:
      triggered: true
      contains: ["No ICEA found", "skipped"]
      not_contains: ["BLOCKED"]
